name: CI

# Paused: re-enable push/PR triggers when ready. Run manually from Actions tab.
on:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint (workspaces)
        run: pnpm -r run lint

      - name: Prettier check
        run: pnpm run format:check

  test-api:
    name: Unit tests (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        working-directory: api
        env:
          DATABASE_URL: postgresql://forge:forge@localhost:5432/cardboardforge
        run: pnpm exec prisma generate

      - name: Vitest
        run: pnpm --filter api test

  test-worker:
    name: Unit tests (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & pytest
        working-directory: worker
        env:
          PYTHONPATH: src
        run: |
          python -m pip install -r requirements.txt
          python -m pytest

  build-containers:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile .

      - name: Build worker image
        run: docker build -f worker/Dockerfile worker

  e2e-placeholder:
    name: E2E (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: |
          echo "Add Playwright E2E against staging or compose stack."
          exit 0

  infra-plan:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt (check)
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init & validate (AWS / prod stack)
        working-directory: infra/envs/prod
        env:
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake
          AWS_REGION: us-east-1
        run: |
          terraform init -input=false
          terraform validate
