name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-format:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: ESLint (workspaces)
        run: pnpm -r run lint

      - name: Prettier check
        run: pnpm run format:check

  test-api:
    name: Unit tests (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Prisma generate
        working-directory: api
        env:
          DATABASE_URL: postgresql://forge:forge@localhost:5432/cardboardforge
        run: pnpm exec prisma generate

      - name: Vitest
        run: pnpm --filter api test

  test-worker:
    name: Unit tests (Worker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install & pytest
        working-directory: worker
        env:
          PYTHONPATH: src
        run: |
          python -m pip install -r requirements.txt
          python -m pytest

  build-containers:
    name: Build Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API image
        run: docker build -f api/Dockerfile .

      - name: Build worker image
        run: docker build -f worker/Dockerfile worker

  e2e-placeholder:
    name: E2E (placeholder)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Placeholder
        run: |
          echo "Add Playwright E2E against staging or compose stack."
          exit 0

  infra-plan:
    name: Terraform validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"

      - name: Terraform fmt (check)
        working-directory: infra
        run: terraform fmt -check -recursive

      - name: Terraform init & validate (AWS / prod stack)
        working-directory: infra/envs/prod
        env:
          AWS_ACCESS_KEY_ID: fake
          AWS_SECRET_ACCESS_KEY: fake
          AWS_REGION: us-east-1
        run: |
          terraform init -input=false
          terraform validate

  deploy-aws:
    name: Deploy to AWS (ECR + ECS + S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: [lint-format, test-api, test-worker, build-containers, infra-plan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      AWS_REGION: us-east-1
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push API image
        env:
          ECR_API: ${{ secrets.ECR_API_REPOSITORY_URL }}
        run: |
          docker build -f api/Dockerfile -t "$ECR_API:${{ github.sha }}" -t "$ECR_API:latest" .
          docker push "$ECR_API:${{ github.sha }}"
          docker push "$ECR_API:latest"

      - name: Build and push worker image
        env:
          ECR_WORKER: ${{ secrets.ECR_WORKER_REPOSITORY_URL }}
        run: |
          docker build -f worker/Dockerfile -t "$ECR_WORKER:${{ github.sha }}" -t "$ECR_WORKER:latest" worker
          docker push "$ECR_WORKER:${{ github.sha }}"
          docker push "$ECR_WORKER:latest"

      - name: Force new ECS deployment
        env:
          CLUSTER: ${{ secrets.ECS_CLUSTER_NAME }}
          SVC_API: ${{ secrets.ECS_API_SERVICE_NAME }}
          SVC_WORKER: ${{ secrets.ECS_WORKER_SERVICE_NAME }}
        run: |
          aws ecs update-service --cluster "$CLUSTER" --service "$SVC_API" --force-new-deployment
          aws ecs update-service --cluster "$CLUSTER" --service "$SVC_WORKER" --force-new-deployment

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend (same-origin /api via CloudFront)
        run: pnpm --filter frontend build

      - name: Sync frontend to S3
        env:
          BUCKET: ${{ secrets.FRONTEND_S3_BUCKET }}
        run: aws s3 sync ./frontend/dist "s3://$BUCKET" --delete

      - name: Invalidate CloudFront
        env:
          DIST: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
        run: aws cloudfront create-invalidation --distribution-id "$DIST" --paths "/*"
