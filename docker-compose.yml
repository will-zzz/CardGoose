services:
  postgres:
    image: postgres:16-alpine
    container_name: cardgoose-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: cardgoose
    # Host 5433 avoids conflict when another Postgres (or Docker) already uses 5432.
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d cardgoose"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: cardgoose-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack
      - ./docker/localstack-ready.d:/etc/localstack/init/ready.d

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: cardgoose-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://forge:forge@postgres:5432/cardgoose
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_BUCKET_ASSETS: cardgoose-assets
      S3_BUCKET_EXPORTS: cardgoose-exports
      SQS_QUEUE_URL: http://localstack:4566/000000000000/cardgoose-pdf-generation
      JWT_SECRET: dev-only-change-me
    command: ["sh", "-c", "npx prisma migrate deploy && node dist/index.js"]
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: cardgoose-worker
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      S3_BUCKET_ASSETS: cardgoose-assets
      S3_BUCKET_EXPORTS: cardgoose-exports
      SQS_QUEUE_URL: http://localstack:4566/000000000000/cardgoose-pdf-generation
      PYTHONPATH: /app/src
    depends_on:
      - localstack

volumes:
  pgdata:
  localstack-data:
