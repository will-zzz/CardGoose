services:
  postgres:
    image: postgres:16-alpine
    container_name: forgecard-postgres
    environment:
      POSTGRES_USER: forge
      POSTGRES_PASSWORD: forge
      POSTGRES_DB: forgecard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forge -d forgecard"]
      interval: 5s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    container_name: forgecard-localstack
    ports:
      - "4566:4566"
    environment:
      SERVICES: s3,sqs
      DEBUG: "0"
    volumes:
      - localstack-data:/var/lib/localstack

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: forgecard-api
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgresql://forge:forge@postgres:5432/forgecard
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      JWT_SECRET: dev-only-change-me
    depends_on:
      postgres:
        condition: service_healthy
      localstack:
        condition: service_started

  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
    container_name: forgecard-worker
    environment:
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: test
      AWS_SECRET_ACCESS_KEY: test
      AWS_ENDPOINT_URL: http://localstack:4566
      PYTHONPATH: /app/src
    depends_on:
      - localstack

volumes:
  pgdata:
  localstack-data:
